# SPDX-License-Identifier: MIT OR Apache-2.0
# CI for miniOS v1.7 — ARM64 only. RISC-V is not buildable yet (see Makefile).
# Gate: pipe a command through the CLI and confirm it responds.

name: miniOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-boot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            qemu-system-arm gdb-multiarch

      - name: Build kernel
        run: make

      - name: Verify ELF load addresses
        run: |
          # Sanity-check that the linker script (hal/arm64/linker.ld) was
          # honoured: the kernel must land at the QEMU virt RAM base
          # 0x40000000, where PSCI's secondary entry and the boot PC both
          # expect it. A misconfigured linker script silently produces a
          # kernel that QEMU loads at the wrong address and diverges into
          # garbage on the first instruction fetch.
          #
          # The previous greps `VirtAddr.*0x40000000` / `VirtAddr.*0x40100000`
          # never actually matched: readelf -l splits each LOAD entry across
          # multiple physical lines, with the column header "VirtAddr" on
          # its own line and the addresses on the LOAD lines themselves —
          # so "VirtAddr" and any address never co-occur on a single line.
          # The check was a permanent no-op until commit 6e0ed0a unblocked
          # the build past the demo_box.obj prereq and the assertion's
          # exit-1 became visible.
          #
          # Replacement: assert the entry point via readelf -h (single-line
          # "Entry point address: 0x40000000") and pull the first LOAD
          # VirtAddr via awk so the comparison is precise and stable across
          # any kernel-size growth that shifts the .rodata segment.
          aarch64-linux-gnu-readelf -h build/arm64/miniOS_kernel_arm64.elf > elf_headers.txt
          aarch64-linux-gnu-readelf -lW build/arm64/miniOS_kernel_arm64.elf >> elf_headers.txt
          cat elf_headers.txt
          grep -E "Entry point address:[[:space:]]+0x40000000" elf_headers.txt
          first_load=$(awk '/^[[:space:]]+LOAD[[:space:]]/ {print $3; exit}' elf_headers.txt)
          echo "first LOAD VirtAddr: $first_load"
          [[ "$first_load" =~ ^0x0*40000000$ ]]

      - name: Boot under QEMU and drive the CLI
        run: |
          # The ec master / hmi service / fake_slave only bind when their
          # configured interfaces exist on the QEMU bus — bare `-M virt`
          # has no virtio-net devices, so the [ec0] cycle banner the
          # next step asserts never fires. Provide the same three
          # virtio-net devices the UI screenshots workflow uses (eth0
          # paired against eth1 over a loopback socket, eth2 on user-
          # mode for outbound traffic). force-legacy=false matches the
          # virtio-mmio bus geometry the kernel's hal_qemu_arm64
          # expects (64-byte device-config region, MSI-X support).
          timeout 15s sh -c 'printf "echo ci-ok\n" | qemu-system-aarch64 \
              -M virt -cpu max -smp 4 -m 128M \
              -global virtio-mmio.force-legacy=false \
              -netdev socket,id=n0,listen=:20001 \
              -device virtio-net-device,netdev=n0 \
              -netdev socket,id=n1,connect=127.0.0.1:20001 \
              -device virtio-net-device,netdev=n1 \
              -netdev user,id=n2 \
              -device virtio-net-device,netdev=n2 \
              -nographic \
              -kernel build/arm64/miniOS_kernel_arm64.elf' > boot.log 2>&1 || true
          cat boot.log
          grep -q "miniOS CLI ready" boot.log
          # CLI echoes lines with CRLF; match the token loosely.
          grep -q "ci-ok" boot.log

      - name: Enforce ClearPath-EC master cycle (>=250 µs, multiple of 250)
        run: |
          # Banner from ethercat/master.cpp:run_loop — "[ecN] cycle=<us>us (...)".
          # Must match for every ec master that started; also validates the
          # numeric constraint. Keep the regex and this check in lockstep with
          # the banner format.
          grep -E "\[ec[0-9]+\] cycle=[0-9]+us" boot.log \
            || { echo "no ec cycle banner in boot log"; exit 1; }
          awk '
            match($0, /\[ec[0-9]+\] cycle=([0-9]+)us/, m) {
              us = m[1] + 0
              if (us < 250 || us % 250 != 0) {
                printf "master cycle %d µs violates ClearPath-EC rule (>=250 and multiple of 250)\n", us
                exit 1
              }
              found = 1
            }
            END { if (!found) { print "no parsable cycle banner"; exit 1 } }
          ' boot.log

      - name: Gate measured cycle p99 (regression guard)
        run: |
          # The static cycle banner above only proves the configured period is
          # legal. This step boots the kernel for ~90 s, drives `ec_hist` to
          # dump the per-master LatencyHistogram (commit 69dbf4e), and parses
          # the p99 line from `diag/histogram.cpp::dump`:
          #   "  ec0:cycle: n=N min=Xus avg=Xus p50=Xus p99=Xus max=Xus"
          #
          # Threshold rationale: under QEMU TCG (especially on shared CI
          # runners) the master sees hundreds of cycle_deadline_miss events
          # in the first second of boot, with individual cycles occasionally
          # blowing past 5 ms when the host scheduler preempts QEMU. The
          # 5000 µs gate is comfortably above that observed drift while
          # still catching a real regression like a stuck cycle, a runaway
          # IRQ storm, or a 50 ms pathological outlier. Tighten as the host
          # configuration stabilises and observed p99 trends down.
          THRESHOLD_US=5000

          bash scripts/qemu_run.sh arm64 90 "ec_hist" > qemu_p99.log 2>&1 || true
          tail -n 200 qemu_p99.log

          p99_a=$(grep -oP 'ec0:cycle.*p99=\K[0-9]+' qemu_p99.log | tail -1)
          p99_b=$(grep -oP 'ec1:cycle.*p99=\K[0-9]+' qemu_p99.log | tail -1)

          if [ -z "$p99_a" ]; then
              echo "ERROR: did not find ec0 p99 reading — ec_hist may not have run"
              echo "       (CLI prompt may have lost the input; rerun or extend timeout)"
              exit 1
          fi
          # ec1 may legitimately be absent if no slaves enrolled on that bus.
          # Gate strictly on ec0 (the loopback master populated by qemu_run.sh)
          # and report ec1 informationally.
          if [ -n "$p99_b" ]; then
              if [ "$p99_b" -gt "$THRESHOLD_US" ]; then
                  echo "ERROR: ec1 cycle p99 $p99_b us exceeds threshold $THRESHOLD_US us"
                  exit 1
              fi
              echo "ec1 cycle p99=$p99_b us (threshold $THRESHOLD_US us)"
          else
              echo "note: no ec1 p99 line — bus likely has no slaves enrolled"
          fi

          if [ "$p99_a" -gt "$THRESHOLD_US" ]; then
              echo "ERROR: ec0 cycle p99 $p99_a us exceeds threshold $THRESHOLD_US us"
              exit 1
          fi
          echo "Cycle p99 within budget: ec0=$p99_a us (threshold $THRESHOLD_US us)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: miniOS-arm64
          path: |
            build/arm64/miniOS_kernel_arm64.elf
            build/arm64/miniOS_kernel_arm64.elf.map
            boot.log
            qemu_p99.log
            elf_headers.txt
