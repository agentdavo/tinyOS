# SPDX-License-Identifier: MIT OR Apache-2.0
# Build the arm64 miniOS kernel, boot it under QEMU, drive the CLI to switch
# through every TSV-defined operator page, capture each as a PNG, and
# regenerate UI.md from the captures.
#
# Two run modes:
#   - workflow_dispatch / push to main: commit the refreshed screenshots and
#     UI.md back to the branch (only if anything changed).
#   - pull_request: build + capture + upload as a workflow artifact, but never
#     push commits. Use this to preview UI changes before they merge.

name: UI screenshots

on:
  push:
    branches: [ main ]
    paths:
      - 'devices/embedded_ui.tsv'
      - 'ui/**'
      - 'cli.cpp'
      - 'scripts/qemu_dump_ui_pages.sh'
      - 'scripts/generate_ui_md.py'
      - '.github/workflows/ui-screenshots.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'devices/embedded_ui.tsv'
      - 'ui/**'
      - 'cli.cpp'
      - 'scripts/qemu_dump_ui_pages.sh'
      - 'scripts/generate_ui_md.py'
      - '.github/workflows/ui-screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write
  # E20: post a comment on the triggering PR with the artifact link.
  # Needs issues:write because the comment API lives under /issues/N/comments
  # (PRs are issues at the REST level). pull-requests:write is required for
  # subscriber/notification routing on some GitHub plans.
  pull-requests: write
  issues: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain, QEMU, ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            qemu-system-arm \
            ffmpeg \
            python3

      - name: Build arm64 kernel
        run: make TARGET=arm64

      - name: Capture every TSV UI page
        run: |
          mkdir -p screenshots
          # Strip stale captures so deleted pages don't linger as orphan PNGs.
          find screenshots -maxdepth 1 -type f \( -name '*.png' -o -name '*.ppm' \) -delete
          bash scripts/qemu_dump_ui_pages.sh "$PWD/screenshots"
          # PPMs are intermediate; keep PNGs only.
          find screenshots -maxdepth 1 -type f -name '*.ppm' -delete
          ls -la screenshots/

      - name: Regenerate UI.md
        run: |
          python3 scripts/generate_ui_md.py screenshots UI.md
          head -40 UI.md

      - name: Upload artifacts
        # Run even when capture / regenerate failed so partial PNGs and the
        # decoded kernel transcript (screenshots/kernel.log) are available
        # for diagnosis. Without this, a hung page leaves nothing to look
        # at and the next iteration is back to guessing.
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: |
            screenshots/*.png
            screenshots/pages.tsv
            screenshots/kernel.log
            UI.md
          if-no-files-found: warn

      - name: Post artifact link on PR (E20)
        # On pull_request events, drop a one-line comment with the artifact
        # download URL so reviewers don't have to drill into the Actions
        # tab to find the rendered screenshots. Runs whether the capture
        # passed or failed (a failed run is still worth signalling — the
        # kernel.log artifact has the diagnostic trail). Skipped on cross-
        # repo PRs because GITHUB_TOKEN can't post comments back to the
        # base repo from a fork PR's context.
        if: |
          always() &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_OUTCOME: ${{ job.status }}
        run: |
          # Embed a screenshot summary by counting rendered PNGs and
          # noting any that came in below 600 bytes — those are the
          # "blank fallback" we used to ship before the heap bump in #19.
          png_count=$(find screenshots -maxdepth 1 -name '*.png' -type f 2>/dev/null | wc -l)
          suspicious=$(find screenshots -maxdepth 1 -name '*.png' -type f -size -600c 2>/dev/null | wc -l)
          status_icon="🟢"
          if [ "${RUN_OUTCOME}" = "failure" ] || [ "${RUN_OUTCOME}" = "cancelled" ]; then
              status_icon="🔴"
          elif [ "$suspicious" -gt 0 ]; then
              status_icon="🟡"
          fi
          # Build the comment body line-by-line into a temp file. A
          # `<<EOF` heredoc would have to drop its body to column 1, which
          # collides with the YAML block-scalar parser (the leading `-`
          # for the bullet list looks like a YAML sequence item).
          body_file=$(mktemp)
          {
              printf '%s **UI screenshots** — captured %s pages. Status: `%s`.\n' "${status_icon}" "${png_count}" "${RUN_OUTCOME}"
              printf '\n'
              printf -- '- 📦 Artifact: %s\n' "${ARTIFACT_URL}"
              printf -- '- 🪵 Workflow run: %s\n' "${JOB_URL}"
              if [ "$suspicious" -gt 0 ]; then
                  printf -- '- ⚠️ %s page(s) under 600 bytes — possible blank-fallback render. Pull the artifact zip to inspect.\n' "${suspicious}"
              fi
              printf '\n'
              printf '_Auto-posted by `.github/workflows/ui-screenshots.yml`. Comment updates on each push to this PR._\n'
          } > "${body_file}"
          body=$(cat "${body_file}")
          # Find any prior comment from this workflow on this PR and
          # update it in place so we don't pile up one comment per push.
          marker='Auto-posted by `.github/workflows/ui-screenshots.yml`'
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | head -n1)
          if [ -n "$existing" ]; then
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" \
                  -f body="${body}"
              echo "Updated existing comment ${existing}"
          else
              gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                  -f body="${body}"
              echo "Posted new comment"
          fi

      - name: Commit refreshed screenshots and UI.md
        # Push back on every event the workflow triggers on:
        #   - push to main / workflow_dispatch: commits go to the
        #     triggering ref directly.
        #   - pull_request from a same-repo branch: commits go to
        #     the PR's head ref so reviewers can see the rendered
        #     screenshots without pulling the artifact zip.
        # Skipped on cross-repo PRs (forks) because GITHUB_TOKEN
        # only has write to the repo it lives in. Detected via
        # github.event.pull_request.head.repo.full_name matching
        # the destination repo.
        if: |
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add screenshots UI.md
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "ui: refresh operator UI screenshots" \
                     -m "Generated by .github/workflows/ui-screenshots.yml from devices/embedded_ui.tsv."
          # Resolve target branch:
          #   - push / workflow_dispatch: $GITHUB_REF is refs/heads/<branch>
          #   - pull_request: actions/checkout@v4 leaves us in detached
          #     HEAD on refs/remotes/pull/N/merge; the real target is
          #     github.event.pull_request.head.ref.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
              TARGET_BRANCH="${{ github.event.pull_request.head.ref }}"
          else
              TARGET_BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          # Race-tolerant push. If the target branch advanced while CI
          # was running (typical when a developer pushes more commits
          # to the PR head while the screenshot job is in flight), the
          # plain push fails non-fast-forward and the whole job is
          # marked failed even though the captures are fine. Fetch and
          # bail-out cleanly when behind so the operator can re-run the
          # workflow against the fresh tip.
          git fetch origin "${TARGET_BRANCH}"
          REMOTE_TIP=$(git rev-parse "origin/${TARGET_BRANCH}")
          PARENT=$(git rev-parse HEAD~1)
          if [ "${REMOTE_TIP}" != "${PARENT}" ]; then
              echo "Target branch ${TARGET_BRANCH} advanced since CI checkout"
              echo "  expected parent: ${PARENT}"
              echo "  remote tip:      ${REMOTE_TIP}"
              echo "Skipping screenshot auto-commit; artifacts uploaded for manual review."
              exit 0
          fi
          echo "Pushing screenshot commit to ${TARGET_BRANCH}"
          git push origin "HEAD:${TARGET_BRANCH}"
