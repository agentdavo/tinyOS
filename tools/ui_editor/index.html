<!DOCTYPE html>
<!--
  miniOS TSV UI Editor - single-file offline browser tool.
  SPDX-License-Identifier: MIT OR Apache-2.0

  Purpose:
    Visual drag-and-drop editor for devices/embedded_ui.tsv, authored to
    round-trip that exact file. Parses / serialises the TSV format consumed
    by ui/ui_builder_tsv.cpp at kernel boot time.

  Round-trip guarantees:
    - Comments (# ...) and blank lines between records are preserved by
      keeping them as "raw" lines attached to the following record.
    - Field ORDER is canonicalised on save to:
        id, parent, x, y, w, h, text, bg, border, color, bind, action,
        focus, scale, font, layout, align, min, max, value
      (matches the order used by devices/embedded_ui.tsv).
    - Fields that are default / empty are omitted on save (matches source).
    - Colours are lowercased #rrggbb or the named form originally read.
    - Record order within a page follows authoring order; pages are emitted
      in the order they were defined.
    - TSV separator is a single ASCII tab; no trailing tabs.
    - A trailing newline is always written.

  Save-path normalisations (intentional, documented):
    - Runs of multiple blank lines collapse to a single blank line.
    - CRLF is normalised to LF.
    - A comment block immediately followed by a record is kept as a block.

  Keyboard shortcuts:
    Delete / Backspace      remove selected widget
    Arrow keys              nudge selection by 1 px (Shift = 10 px)
    Ctrl+S                  save (download or re-write file)
    Ctrl+D                  duplicate selected widget
    Ctrl+Z / Ctrl+Y         undo / redo
    Escape                  clear selection

  Data model:
    doc = { pages:[{id,title,records:[{kind,fields,raw,id?}]}], fileHandle }
    Records come in five kinds: widget, action, include, child, page (page
    is implicit at page[].records top). Each record carries the set of
    fields it parsed from TSV; unknown keys are preserved as-is.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>miniOS UI Editor</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --panel2: #111827; --border: #334155;
    --ink: #e2e8f0; --muted: #94a3b8; --accent: #2563eb; --bad: #dc2626;
    --ok: #059669; --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 13px; }
  button, select, input[type=text], input[type=number] {
    background: var(--panel); color: var(--ink); border: 1px solid var(--border);
    padding: 4px 8px; border-radius: 3px; font: inherit;
  }
  button { cursor: pointer; }
  button:hover { background: var(--border); }
  button.primary { background: var(--accent); border-color: var(--accent); }
  input[type=color] { width: 32px; height: 24px; padding: 0; border: 1px solid var(--border); background: none; }
  .invalid { border-color: var(--bad) !important; background: #4c1d1d !important; }
  #app { display: grid; grid-template-rows: 44px 1fr; height: 100%; }

  /* ---- top bar ---- */
  #topbar { display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    background: var(--panel2); border-bottom: 1px solid var(--border); }
  #topbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  #pagetabs { display: flex; gap: 4px; align-items: center; flex: 1; overflow-x: auto; }
  .pagetab { padding: 4px 10px; border-radius: 3px; background: var(--panel); cursor: pointer;
    border: 1px solid var(--border); white-space: nowrap; }
  .pagetab.active { background: var(--accent); border-color: var(--accent); }
  .pagetab .close { margin-left: 6px; opacity: 0.6; }
  .pagetab .close:hover { opacity: 1; color: var(--bad); }
  #zoomlabel { color: var(--muted); width: 50px; text-align: right; }
  .chip { padding: 2px 6px; background: #312e81; border-radius: 3px; font-size: 11px; }
  .chip .x { margin-left: 4px; opacity: 0.7; cursor: pointer; }

  /* ---- main ---- */
  #main { display: grid; grid-template-columns: 200px 1fr 340px; height: 100%;
    overflow: hidden; }
  #palette, #inspector { background: var(--panel2); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 8px; }
  #inspector { border-right: none; border-left: 1px solid var(--border); }
  #palette h4, #inspector h4 { margin: 4px 0 6px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; }
  .paletteitem { display: block; width: 100%; margin-bottom: 4px; text-align: left; }
  #includes { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

  /* ---- canvas ---- */
  #canvaswrap { overflow: auto; background: #020617; position: relative; }
  #canvas { position: relative; background: #fff; margin: 20px;
    box-shadow: 0 0 0 1px var(--border), 0 8px 24px rgba(0,0,0,0.6);
    transform-origin: 0 0; }
  #canvas.showgrid { background-image:
    linear-gradient(to right, rgba(0,0,0,0.08) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.08) 1px, transparent 1px);
    background-size: 10px 10px; }
  .w { position: absolute; overflow: hidden; box-sizing: border-box;
    cursor: move; user-select: none; font-family: monospace; }
  .w.sel { outline: 2px solid #38bdf8; outline-offset: 0; z-index: 10; }
  .w.included { opacity: 0.35; pointer-events: none; filter: grayscale(0.2); }
  .handle { position: absolute; width: 10px; height: 10px; background: #38bdf8;
    border: 1px solid #0b1220; z-index: 20; }
  .handle.nw { left: -5px; top: -5px; cursor: nwse-resize; }
  .handle.ne { right: -5px; top: -5px; cursor: nesw-resize; }
  .handle.sw { left: -5px; bottom: -5px; cursor: nesw-resize; }
  .handle.se { right: -5px; bottom: -5px; cursor: nwse-resize; }
  .handle.n  { left: 50%; top: -5px; transform: translateX(-50%); cursor: ns-resize; }
  .handle.s  { left: 50%; bottom: -5px; transform: translateX(-50%); cursor: ns-resize; }
  .handle.w  { left: -5px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
  .handle.e  { right: -5px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }

  /* ---- inspector fields ---- */
  .row { display: grid; grid-template-columns: 80px 1fr; gap: 6px; margin-bottom: 4px;
    align-items: center; }
  .row label { color: var(--muted); font-size: 11px; }
  .row input, .row select { width: 100%; }
  .row.split { grid-template-columns: 80px 1fr 1fr; }
  #actionspanel { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  #actionspanel table { width: 100%; font-size: 11px; border-collapse: collapse; }
  #actionspanel td { padding: 2px 4px; border-bottom: 1px solid var(--border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; cursor: pointer; }
  #actionspanel td:hover { background: var(--panel); }
  #status { color: var(--muted); font-size: 11px; margin-left: 8px; }
  details summary { cursor: pointer; padding: 2px 0; color: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="btnNew">New</button>
    <button id="btnOpen">Open</button>
    <button id="btnSave">Save</button>
    <button id="btnSaveAs">Save As</button>
    <input type="file" id="fileInput" accept=".tsv" style="display:none">
    <span class="sep"></span>
    <div id="pagetabs"></div>
    <button id="btnAddPage" title="New page">+</button>
    <span class="sep"></span>
    <label><input type="checkbox" id="gridToggle" checked> Grid</label>
    <label><input type="checkbox" id="snapToggle" checked> Snap 10px</label>
    <input type="range" id="zoom" min="25" max="200" value="50" style="width:100px">
    <span id="zoomlabel">50%</span>
    <span id="status"></span>
  </div>
  <div id="main">
    <div id="palette">
      <h4>Widgets</h4>
      <button class="paletteitem" data-type="label">Label</button>
      <button class="paletteitem" data-type="button">Button</button>
      <button class="paletteitem" data-type="panel">Panel</button>
      <button class="paletteitem" data-type="container">Container</button>
      <button class="paletteitem" data-type="slider">Slider</button>
      <button class="paletteitem" data-type="input">Input</button>
      <button class="paletteitem" data-type="progress">Progress</button>
      <button class="paletteitem" data-type="image">Image</button>
      <button class="paletteitem" data-type="graph">Graph</button>
      <h4>Includes (this page)</h4>
      <div id="includes"></div>
      <button id="btnAddInclude" style="margin-top:6px">+ include</button>
      <h4>Help</h4>
      <div style="color:var(--muted);font-size:11px;line-height:1.4">
        Click a palette item then click on canvas to drop.<br>
        Drag widgets to move. Handles resize. Arrow keys nudge.<br>
        Ctrl+S save, Ctrl+Z/Y undo/redo, Del remove.<br>
        Canvas is 1080x1920 portrait (the kernel target).
      </div>
    </div>

    <div id="canvaswrap">
      <div id="canvas" class="showgrid" style="width:1080px;height:1920px"></div>
    </div>

    <div id="inspector">
      <h4>Inspector</h4>
      <div id="props">
        <div style="color:var(--muted)">No widget selected.</div>
      </div>
      <div id="actionspanel">
        <details open>
          <summary>Actions on this page</summary>
          <table id="actionstable"><tbody></tbody></table>
          <button id="btnAddAction" style="margin-top:4px">+ action</button>
        </details>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================================
 *  Bind / action catalogues (extracted from ui_builder_tsv.cpp).
 * ========================================================================= */
const BIND_GROUPS = {
  Machine: ["mode","alarm","prompt","units","wcs","cycle_progress","torque",
            "feed","spindle","spindle_rpm","spindle_load","block_current",
            "block_next","runtime","parts","page","page_name",
            "selected_axis","jog_increment"],
  DRO: ["axis:x","axis:y","axis:z","axis:a",
        "axis:x:cmd","axis:y:cmd","axis:z:cmd","axis:a:cmd",
        "axis:x:act","axis:y:act","axis:z:act","axis:a:act",
        "axis:x:dtg","axis:y:dtg","axis:z:dtg","axis:a:dtg",
        "axis:x:homed","axis:y:homed","axis:z:homed","axis:a:homed"],
  Program: ["program_name","program_count","program_blocks","program_bytes",
            "preview_points"],
  Offsets: ["work_name","work_offset:x","work_offset:y","work_offset:z","work_offset:a"],
  Tool: ["tool_name","tool_length","tool_radius","tool_wear","active_tool"],
  Macro: ["macro_name","macro_active","macro_status","macro_step","macro_count",
          "macro_message"],
  Probe: ["probe_x","probe_y","probe_z","probe_done","probe_stylus",
          "probe_center_x","probe_center_y","probe_size_x","probe_size_y",
          "probe_shift_x","probe_shift_y","probe_shift_z",
          "probe_sphere_ready","probe_sphere_points"],
  MDI: ["mdi:input","mdi:last","mdi:status","mdi:message","mdi:depth"],
};
const ALL_BINDS = new Set(Object.values(BIND_GROUPS).flat());

const ACTION_GROUPS = {
  Pages: ["page:position","page:program","page:offsets","page:ethercat",
          "page:alarms","page:setup"],
  Demo: ["demo:cycle","demo:hold","demo:reset","demo:home","demo:jog+",
         "demo:jog-","demo:estop"],
  Program: ["program:prev","program:next","program:simulate"],
  Macro: ["macro:prev","macro:next","macro:run","macro:abort"],
  Setup: ["setup:save","setup:load"],
  MDI: ["mdi:submit","mdi:clear","mdi:abort"],
  Jog: ["jog:axis:0","jog:axis:1","jog:axis:2","jog:axis:3",
        "jog:inc:1","jog:inc:10","jog:inc:100","jog:inc:1000"],
  Offsets: ["offset:work:0","offset:work:1","offset:work:2","offset:work:3",
            "offset:work:4","offset:work:5",
            "offset:tool:0","offset:tool:1","offset:tool:2","offset:tool:3",
            "offset:tool:4","offset:tool:5","offset:tool:6","offset:tool:7"],
  Commit: ["commit:offset:x","commit:offset:y","commit:offset:z","commit:offset:a",
           "commit:tool:length","commit:tool:radius","commit:tool:wear",
           "commit:restart:line"],
};
function actionIsValid(target, doc) {
  if (!target) return true;
  if (target.startsWith("goto:")) {
    const id = target.slice(5);
    return doc.pages.some(p => p.id === id);
  }
  if (target.startsWith("macro:run:")) return true;
  if (target.startsWith("offset:nudge:")) return true;
  if (target.startsWith("offset:work:") || target.startsWith("offset:tool:")) return true;
  if (target.startsWith("jog:axis:") || target.startsWith("jog:inc:")) return true;
  for (const list of Object.values(ACTION_GROUPS))
    if (list.includes(target)) return true;
  return false;
}

const NAMED_COLORS = {black:"#000000",white:"#ffffff",red:"#ff0000",green:"#00ff00",
  blue:"#0000ff",yellow:"#ffff00",cyan:"#00ffff",magenta:"#ff00ff",gray:"#808080",
  darkgray:"#404040",lightgray:"#c0c0c0",orange:"#ffa500"};
const WIDGET_TYPES = ["label","button","panel","container","slider","input",
                      "progress","image","graph"];
const FIELD_ORDER = ["id","parent","x","y","w","h","text","color","bg","border",
  "bind","action","active_if","focus","scale","font","layout","align","min","max","value"];

/* =========================================================================
 *  Parser / serialiser.
 * ========================================================================= */
function parseTSV(text) {
  text = text.replace(/\r\n/g, "\n");
  const lines = text.split("\n");
  const doc = { pages: [], fileName: null };
  let curPage = null;
  let pendingRaw = [];

  for (const line of lines) {
    if (line === "" || line.startsWith("#")) {
      pendingRaw.push(line);
      continue;
    }
    const cols = line.split("\t");
    const kind = cols[0];
    const fields = {};
    const order = [];  // keys in source order, for round-trip preservation
    for (let i = 1; i < cols.length; ++i) {
      const c = cols[i];
      if (!c) continue;
      const eq = c.indexOf("=");
      const key = eq < 0 ? c : c.slice(0, eq);
      fields[key] = eq < 0 ? "" : c.slice(eq + 1);
      order.push(key);
    }
    fields.__order = order;
    if (kind === "page") {
      curPage = { id: fields.id || "page" + doc.pages.length,
                  title: fields.title || "",
                  records: [], raw: pendingRaw };
      doc.pages.push(curPage);
      pendingRaw = [];
    } else {
      if (!curPage) {
        curPage = { id: "default", title: "", records: [], raw: pendingRaw };
        doc.pages.push(curPage);
        pendingRaw = [];
      }
      // Kernel parser treats `title=` and `src=` as aliases for `text=`
      // (ui/ui_builder_tsv.cpp parse_widget). Normalise to `text=` in-memory
      // so the inspector can edit one field; remember the original keyword
      // in __textKey so serializeTSV can emit it unchanged on save.
      if (fields.text === undefined || fields.text === "") {
        if (fields.title !== undefined && fields.title !== "") {
          fields.text = fields.title;
          fields.__textKey = "title";
          delete fields.title;
        } else if (fields.src !== undefined && fields.src !== "") {
          fields.text = fields.src;
          fields.__textKey = "src";
          delete fields.src;
        }
      }
      const rec = { kind, fields, raw: pendingRaw };
      pendingRaw = [];
      curPage.records.push(rec);
    }
  }
  if (pendingRaw.length) {
    // trailing comments: attach to last page
    if (doc.pages.length) doc.pages[doc.pages.length - 1].trailingRaw = pendingRaw;
  }
  return doc;
}

function serializeTSV(doc) {
  const out = [];
  const emitRaw = (lines) => {
    if (!lines) return;
    let lastBlank = false;
    for (const l of lines) {
      if (l === "") {
        if (lastBlank) continue;
        lastBlank = true;
      } else lastBlank = false;
      out.push(l);
    }
  };
  const emitRec = (kind, fields) => {
    const parts = [kind];
    const seen = new Set();
    // Records parsed from a source file carry __order = [keys in source order]
    // and may carry __textKey ("title"/"src") to round-trip the text-alias
    // keyword. Records created via drag-drop have neither and emit in
    // FIELD_ORDER. The kernel parser accepts any field order, so the only
    // reason to care is to keep diffs empty on save.
    const textKey = fields.__textKey || "text";
    const emitValue = (key) => {
      if (key === "text" && textKey !== "text") key = textKey;
      const val = (key === textKey && textKey !== "text") ? fields.text : fields[key];
      if (val === undefined || val === "" || val === null) return;
      parts.push(key + "=" + val);
      seen.add(key);
      if (key === textKey) seen.add("text");
    };
    const orderKeys = Array.isArray(fields.__order) && fields.__order.length
      ? fields.__order
      : FIELD_ORDER;
    for (const k of orderKeys) emitValue(k);
    // If __order was used, also append any new keys the user added in the
    // inspector (they won't be in __order).
    if (Array.isArray(fields.__order)) {
      for (const k of Object.keys(fields)) {
        if (seen.has(k) || k.startsWith("__") || k === textKey) continue;
        if (fields[k] === undefined || fields[k] === "") continue;
        parts.push(k + "=" + fields[k]);
        seen.add(k);
      }
    } else {
      // Canonical path: emit aliased text key in trailing position, then
      // preserve unknown keys (widget=/event=/target= on actions, etc.).
      if (textKey !== "text" && fields.text !== undefined &&
          fields.text !== "" && fields.text !== null) {
        parts.push(textKey + "=" + fields.text);
        seen.add(textKey);
        seen.add("text");
      }
      for (const k of Object.keys(fields)) {
        if (seen.has(k) || k.startsWith("__")) continue;
        if (fields[k] === undefined || fields[k] === "") continue;
        parts.push(k + "=" + fields[k]);
      }
    }
    out.push(parts.join("\t"));
  };

  for (const p of doc.pages) {
    emitRaw(p.raw);
    emitRec("page", { id: p.id, title: p.title });
    for (const r of p.records) {
      emitRaw(r.raw);
      emitRec(r.kind, r.fields);
    }
    emitRaw(p.trailingRaw);
  }
  return out.join("\n") + "\n";
}

/* =========================================================================
 *  App state + persistence.
 * ========================================================================= */
const LS_KEY = "miniOS.uiEditor.doc.v1";
let doc = null;
let activePageIdx = 0;
let selectedIdx = -1; // index into active page's records; -1 = none
let pendingDropType = null;
let fileHandle = null;
let zoom = 0.5;
let undoStack = [], redoStack = [];

function pushUndo() {
  undoStack.push(JSON.stringify(doc));
  if (undoStack.length > 50) undoStack.shift();
  redoStack.length = 0;
}
function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(doc));
  doc = JSON.parse(undoStack.pop());
  selectedIdx = -1; renderAll();
}
function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(doc));
  doc = JSON.parse(redoStack.pop());
  selectedIdx = -1; renderAll();
}

// ---- BEGIN SYNCED DEFAULTS (regenerate via tools/ui_editor/sync_defaults.sh) ----
const DEFAULT_UI_TSV = `# SPDX-License-Identifier: MIT OR Apache-2.0

// ---- END SYNCED DEFAULTS ----

function newDoc() {
  // First run / File -> New loads the kernel's shipped operator UI so the
  // editor opens on the real dashboard / jog / mdi / program / view /
  // offsets / macros / service / probe surface. DEFAULT_UI_TSV is
  // regenerated from devices/embedded_ui.tsv via
  // tools/ui_editor/sync_defaults.sh — rerun it when the shipped TSV
  // changes. Fallback to an empty "main" page if the inlined copy is
  // missing or corrupt.
  try {
    if (typeof DEFAULT_UI_TSV === "string" && DEFAULT_UI_TSV.length) {
      doc = parseTSV(DEFAULT_UI_TSV);
      doc.fileName = "embedded_ui.tsv";
    } else {
      doc = { pages: [{ id: "main", title: "Main", records: [], raw: [] }] };
    }
  } catch (e) {
    doc = { pages: [{ id: "main", title: "Main", records: [], raw: [] }] };
  }
  activePageIdx = 0; selectedIdx = -1;
  undoStack = []; redoStack = [];
}

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(doc)); } catch (e) {}
}
function loadLocal() {
  try {
    const s = localStorage.getItem(LS_KEY);
    if (s) { doc = JSON.parse(s); return true; }
  } catch (e) {}
  return false;
}

/* =========================================================================
 *  Rendering.
 * ========================================================================= */
const $ = (s) => document.querySelector(s);
const canvas = $("#canvas");

function activePage() { return doc.pages[activePageIdx]; }
function pageById(id) { return doc.pages.find(p => p.id === id); }

function resolveColor(c, fallback) {
  if (!c) return fallback;
  if (c.startsWith("#")) return c;
  return NAMED_COLORS[c] || fallback;
}

function widgetsOnPage(page) {
  return page.records.filter(r => WIDGET_TYPES.includes(r.kind));
}

function includesOnPage(page) {
  return page.records.filter(r => r.kind === "include");
}

function renderCanvas() {
  canvas.innerHTML = "";
  canvas.style.transform = `scale(${zoom})`;
  canvas.parentElement.style.setProperty("--zoom", zoom);
  // include dimmed widgets from included pages first (behind)
  for (const inc of includesOnPage(activePage())) {
    const target = pageById(inc.fields.page);
    if (!target) continue;
    for (const r of widgetsOnPage(target)) renderWidget(r, true, -1);
  }
  const widgets = widgetsOnPage(activePage());
  widgets.forEach((r, i) => {
    const recIndex = activePage().records.indexOf(r);
    renderWidget(r, false, recIndex);
  });
}

function renderWidget(r, included, recIndex) {
  const f = r.fields;
  const x = +f.x || 0, y = +f.y || 0;
  const w = +f.w || 100, h = +f.h || (r.kind === "label" ? 24 : 40);
  const el = document.createElement("div");
  el.className = "w" + (included ? " included" : "");
  if (!included && recIndex === selectedIdx) el.classList.add("sel");
  el.style.left = x + "px"; el.style.top = y + "px";
  el.style.width = w + "px"; el.style.height = h + "px";
  const bg = resolveColor(f.bg, r.kind === "button" ? "#374151" : "transparent");
  const border = resolveColor(f.border, null);
  const color = resolveColor(f.color, "#e5e7eb");
  if (bg !== "transparent") el.style.background = bg;
  if (border) el.style.border = "3px solid " + border;
  el.style.color = color;
  const scale = +f.scale || 1;
  el.style.fontSize = Math.max(10, 12 * scale) + "px";
  el.style.lineHeight = h + "px";
  el.style.textAlign = f.align || (r.kind === "button" ? "center" : "left");
  el.style.padding = r.kind === "button" ? "0 16px" : "0 4px";

  let text = f.text || "";
  if (f.bind) text = text || "[" + f.bind + "]";
  if (r.kind === "panel" && f.text) {
    const title = document.createElement("div");
    title.textContent = f.text;
    title.style.cssText = "position:absolute;left:20px;top:10px;font-size:11px;color:" + color;
    el.appendChild(title);
    text = "";
  }
  if (r.kind === "progress") {
    const val = +f.value || 0, max = +f.max || 100;
    const pct = Math.min(100, Math.max(0, (val / max) * 100));
    const fill = document.createElement("div");
    fill.style.cssText = `position:absolute;left:0;top:0;bottom:0;width:${pct}%;background:${color};`;
    el.appendChild(fill);
    text = "";
  }
  if (r.kind === "slider") {
    const val = +f.value || 0, min = +f.min || 0, max = +f.max || 100;
    const pct = max > min ? ((val - min) / (max - min)) * 100 : 0;
    const thumb = document.createElement("div");
    thumb.style.cssText = `position:absolute;left:${pct}%;top:0;bottom:0;width:8px;background:${color};`;
    el.appendChild(thumb);
    text = "[slider " + min + ".." + max + "=" + val + "]";
  }
  if (r.kind === "image") text = "[img " + (f.text || "") + "]";
  if (r.kind === "graph") text = "[graph]";

  if (text) {
    const t = document.createElement("span");
    t.textContent = text;
    el.appendChild(t);
  }

  if (!included) {
    el.dataset.idx = recIndex;
    el.addEventListener("mousedown", onWidgetMouseDown);
    if (recIndex === selectedIdx) {
      for (const d of ["nw","n","ne","e","se","s","sw","w"]) {
        const hd = document.createElement("div");
        hd.className = "handle " + d;
        hd.dataset.dir = d;
        hd.addEventListener("mousedown", onHandleMouseDown);
        el.appendChild(hd);
      }
    }
  }
  canvas.appendChild(el);
}

/* =========================================================================
 *  Inspector.
 * ========================================================================= */
function renderInspector() {
  const p = $("#props");
  p.innerHTML = "";
  const page = activePage();
  const rec = selectedIdx >= 0 ? page.records[selectedIdx] : null;
  if (!rec || !WIDGET_TYPES.includes(rec.kind)) {
    p.innerHTML = '<div style="color:var(--muted)">No widget selected.</div>';
    renderActionsPanel();
    return;
  }
  const f = rec.fields;

  const addRow = (label, node) => {
    const row = document.createElement("div");
    row.className = "row";
    const l = document.createElement("label");
    l.textContent = label;
    row.appendChild(l); row.appendChild(node);
    p.appendChild(row);
  };
  const mkInput = (key, type = "text", extra = {}) => {
    const inp = document.createElement("input");
    inp.type = type;
    inp.value = f[key] !== undefined ? f[key] : "";
    Object.assign(inp, extra);
    inp.addEventListener("input", () => {
      pushUndo();
      if (inp.value === "") delete f[key]; else f[key] = inp.value;
      renderCanvas(); saveLocal();
    });
    return inp;
  };
  const mkColor = (key) => {
    const wrap = document.createElement("div");
    wrap.style.display = "flex"; wrap.style.gap = "4px";
    const text = mkInput(key);
    const col = document.createElement("input");
    col.type = "color";
    col.value = resolveColor(f[key], "#000000");
    col.addEventListener("input", () => {
      pushUndo();
      f[key] = col.value;
      text.value = col.value;
      renderCanvas(); saveLocal();
    });
    wrap.appendChild(text); wrap.appendChild(col);
    return wrap;
  };
  const mkSelect = (key, options, groups = null, validator = null) => {
    const sel = document.createElement("select");
    const blank = document.createElement("option");
    blank.value = ""; blank.textContent = "(none)";
    sel.appendChild(blank);
    const addOpt = (v) => {
      const o = document.createElement("option"); o.value = v; o.textContent = v;
      sel.appendChild(o);
    };
    if (groups) {
      for (const [g, opts] of Object.entries(groups)) {
        const og = document.createElement("optgroup"); og.label = g;
        for (const v of opts) {
          const o = document.createElement("option"); o.value = v; o.textContent = v;
          og.appendChild(o);
        }
        sel.appendChild(og);
      }
    } else if (options) {
      for (const v of options) addOpt(v);
    }
    // handle custom (unknown) values - add option
    if (f[key] && !sel.querySelector(`option[value="${CSS.escape(f[key])}"]`)) {
      const o = document.createElement("option"); o.value = f[key]; o.textContent = f[key] + " (custom)";
      sel.insertBefore(o, sel.children[1]);
    }
    sel.value = f[key] || "";
    sel.addEventListener("change", () => {
      pushUndo();
      if (sel.value === "") delete f[key]; else f[key] = sel.value;
      renderInspector(); renderCanvas(); saveLocal();
    });
    if (validator && f[key] && !validator(f[key])) sel.classList.add("invalid");
    return sel;
  };

  addRow("type", (() => {
    const sel = document.createElement("select");
    for (const t of WIDGET_TYPES) {
      const o = document.createElement("option"); o.value = t; o.textContent = t;
      sel.appendChild(o);
    }
    sel.value = rec.kind;
    sel.addEventListener("change", () => { pushUndo(); rec.kind = sel.value; renderCanvas(); saveLocal(); });
    return sel;
  })());
  addRow("id", mkInput("id"));
  const parentSel = mkInput("parent");
  const parentIds = widgetsOnPage(activePage()).map(r => r.fields.id).filter(Boolean);
  if (f.parent && !parentIds.includes(f.parent)) parentSel.classList.add("invalid");
  addRow("parent", parentSel);
  addRow("x", mkInput("x", "number"));
  addRow("y", mkInput("y", "number"));
  addRow("w", mkInput("w", "number"));
  addRow("h", mkInput("h", "number"));
  addRow("text", mkInput("text"));
  addRow("color", mkColor("color"));
  addRow("bg", mkColor("bg"));
  addRow("border", mkColor("border"));

  addRow("bind", mkSelect("bind", null, BIND_GROUPS, (v) => ALL_BINDS.has(v)));

  // action: include goto:<page> options
  const actionGroups = { ...ACTION_GROUPS };
  actionGroups.Goto = doc.pages.map(pg => "goto:" + pg.id);
  addRow("action", mkSelect("action", null, actionGroups, (v) => actionIsValid(v, doc)));

  addRow("focus", mkInput("focus", "number"));
  addRow("scale", mkInput("scale", "number", { min: 1, max: 4, title: "Integer pixel scale for draw_text_scaled (1..4). DRO cmd rows use 3." }));
  addRow("font", mkInput("font"));

  // active_if: "<bind>:<int>" — for buttons that should brighten when a
  // binder value matches (e.g. WCS row for the currently-active work offset).
  if (rec.kind === "button") {
    const wrap = document.createElement("div");
    wrap.style.display = "flex"; wrap.style.gap = "4px";
    const bindSel = document.createElement("select");
    const none = document.createElement("option");
    none.value = ""; none.textContent = "(none)"; bindSel.appendChild(none);
    for (const [group, keys] of Object.entries(BIND_GROUPS)) {
      const og = document.createElement("optgroup"); og.label = group;
      for (const k of keys) {
        const o = document.createElement("option"); o.value = k; o.textContent = k;
        og.appendChild(o);
      }
      bindSel.appendChild(og);
    }
    const valInp = document.createElement("input");
    valInp.type = "number"; valInp.style.width = "72px";
    valInp.title = "Integer value the bind must equal for the button to brighten";
    const cur = (f.active_if || "").split(":");
    // active_if may look like "wcs:0" or "axis:x:cmd:42" — rightmost integer is value
    if (cur.length >= 2) {
      valInp.value = cur[cur.length - 1];
      bindSel.value = cur.slice(0, -1).join(":");
    }
    const apply = () => {
      pushUndo();
      if (!bindSel.value || valInp.value === "") delete f.active_if;
      else f.active_if = bindSel.value + ":" + valInp.value;
      renderCanvas(); saveLocal();
    };
    bindSel.addEventListener("change", apply);
    valInp.addEventListener("change", apply);
    wrap.appendChild(bindSel); wrap.appendChild(valInp);
    addRow("active_if", wrap);
  }

  if (rec.kind === "panel" || rec.kind === "container") {
    const sel = document.createElement("select");
    for (const v of ["","horizontal","vertical","grid"]) {
      const o = document.createElement("option"); o.value = v; o.textContent = v || "(none)";
      sel.appendChild(o);
    }
    sel.value = f.layout || "";
    sel.addEventListener("change", () => {
      pushUndo();
      if (sel.value === "") delete f.layout; else f.layout = sel.value;
      saveLocal();
    });
    addRow("layout", sel);
  }

  const alignSel = document.createElement("select");
  for (const v of ["","left","center","right"]) {
    const o = document.createElement("option"); o.value = v; o.textContent = v || "(none)";
    alignSel.appendChild(o);
  }
  alignSel.value = f.align || "";
  alignSel.addEventListener("change", () => {
    pushUndo();
    if (alignSel.value === "") delete f.align; else f.align = alignSel.value;
    renderCanvas(); saveLocal();
  });
  addRow("align", alignSel);

  if (rec.kind === "slider" || rec.kind === "progress") {
    addRow("min", mkInput("min", "number"));
    addRow("max", mkInput("max", "number"));
    addRow("value", mkInput("value", "number"));
  }

  const delBtn = document.createElement("button");
  delBtn.textContent = "Delete widget";
  delBtn.style.marginTop = "8px";
  delBtn.addEventListener("click", deleteSelected);
  p.appendChild(delBtn);

  const dupBtn = document.createElement("button");
  dupBtn.textContent = "Duplicate";
  dupBtn.style.marginLeft = "4px";
  dupBtn.addEventListener("click", duplicateSelected);
  p.appendChild(dupBtn);

  renderActionsPanel();
}

function renderActionsPanel() {
  const body = $("#actionstable tbody");
  body.innerHTML = "";
  const page = activePage();
  page.records.forEach((r, i) => {
    if (r.kind !== "action") return;
    const tr = document.createElement("tr");
    for (const key of ["widget","event","target"]) {
      const td = document.createElement("td");
      const inp = document.createElement("input");
      inp.type = "text";
      inp.value = r.fields[key] || "";
      inp.style.width = "100%";
      inp.addEventListener("input", () => {
        pushUndo();
        r.fields[key] = inp.value;
        saveLocal();
      });
      if (key === "target" && r.fields.target && !actionIsValid(r.fields.target, doc)) {
        inp.classList.add("invalid");
      }
      td.appendChild(inp);
      tr.appendChild(td);
    }
    const dtd = document.createElement("td");
    const del = document.createElement("button");
    del.textContent = "x";
    del.addEventListener("click", () => {
      pushUndo();
      page.records.splice(i, 1);
      renderAll(); saveLocal();
    });
    dtd.appendChild(del); tr.appendChild(dtd);
    body.appendChild(tr);
  });
}

function renderPageTabs() {
  const bar = $("#pagetabs");
  bar.innerHTML = "";
  doc.pages.forEach((p, i) => {
    const t = document.createElement("div");
    t.className = "pagetab" + (i === activePageIdx ? " active" : "");
    t.textContent = p.id;
    t.addEventListener("click", () => { activePageIdx = i; selectedIdx = -1; renderAll(); });
    const rename = document.createElement("span");
    rename.className = "close"; rename.textContent = " E";
    rename.title = "rename";
    rename.addEventListener("click", (e) => {
      e.stopPropagation();
      const nv = prompt("Page id:", p.id);
      if (!nv || nv === p.id) return;
      pushUndo();
      p.id = nv; renderAll(); saveLocal();
    });
    const del = document.createElement("span");
    del.className = "close"; del.textContent = " x";
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!confirm("Delete page '" + p.id + "'?")) return;
      pushUndo();
      doc.pages.splice(i, 1);
      if (!doc.pages.length) doc.pages.push({ id: "main", title: "", records: [], raw: [] });
      activePageIdx = Math.min(activePageIdx, doc.pages.length - 1);
      selectedIdx = -1; renderAll(); saveLocal();
    });
    t.appendChild(rename); t.appendChild(del);
    bar.appendChild(t);
  });
}

function renderIncludes() {
  const box = $("#includes");
  box.innerHTML = "";
  for (const inc of includesOnPage(activePage())) {
    const c = document.createElement("span");
    c.className = "chip";
    c.textContent = inc.fields.page || "?";
    const x = document.createElement("span");
    x.className = "x"; x.textContent = "x";
    x.addEventListener("click", () => {
      pushUndo();
      const p = activePage();
      const i = p.records.indexOf(inc);
      p.records.splice(i, 1);
      renderAll(); saveLocal();
    });
    c.appendChild(x);
    box.appendChild(c);
  }
}

function renderAll() {
  renderPageTabs();
  renderIncludes();
  renderCanvas();
  renderInspector();
  $("#status").textContent = doc.pages.reduce((a, p) => a + widgetsOnPage(p).length, 0) + " widgets";
}

/* =========================================================================
 *  Mouse interaction.
 * ========================================================================= */
let drag = null;

function snap(v) {
  return $("#snapToggle").checked ? Math.round(v / 10) * 10 : Math.round(v);
}

function onWidgetMouseDown(e) {
  if (e.target.classList.contains("handle")) return;
  const idx = +e.currentTarget.dataset.idx;
  selectedIdx = idx;
  const rec = activePage().records[idx];
  drag = { mode: "move", rec, startX: e.clientX, startY: e.clientY,
           origX: +rec.fields.x || 0, origY: +rec.fields.y || 0 };
  pushUndo();
  renderAll();
  e.preventDefault();
}
function onHandleMouseDown(e) {
  e.stopPropagation();
  const dir = e.currentTarget.dataset.dir;
  const rec = activePage().records[selectedIdx];
  drag = { mode: "resize", dir, rec, startX: e.clientX, startY: e.clientY,
           origX: +rec.fields.x || 0, origY: +rec.fields.y || 0,
           origW: +rec.fields.w || 100, origH: +rec.fields.h || 40 };
  pushUndo();
  e.preventDefault();
}
window.addEventListener("mousemove", (e) => {
  if (!drag) return;
  const dx = (e.clientX - drag.startX) / zoom;
  const dy = (e.clientY - drag.startY) / zoom;
  const f = drag.rec.fields;
  if (drag.mode === "move") {
    f.x = snap(drag.origX + dx);
    f.y = snap(drag.origY + dy);
  } else {
    let x = drag.origX, y = drag.origY, w = drag.origW, h = drag.origH;
    if (drag.dir.includes("e")) w = Math.max(10, snap(drag.origW + dx));
    if (drag.dir.includes("s")) h = Math.max(10, snap(drag.origH + dy));
    if (drag.dir.includes("w")) { x = snap(drag.origX + dx); w = Math.max(10, drag.origW - (x - drag.origX)); }
    if (drag.dir.includes("n")) { y = snap(drag.origY + dy); h = Math.max(10, drag.origH - (y - drag.origY)); }
    f.x = x; f.y = y; f.w = w; f.h = h;
  }
  renderCanvas();
});
window.addEventListener("mouseup", () => {
  if (drag) { drag = null; renderInspector(); saveLocal(); }
});

canvas.addEventListener("mousedown", (e) => {
  if (e.target !== canvas) return;
  if (pendingDropType) {
    const rect = canvas.getBoundingClientRect();
    const x = snap((e.clientX - rect.left) / zoom);
    const y = snap((e.clientY - rect.top) / zoom);
    pushUndo();
    const rec = { kind: pendingDropType, fields: { x, y, w: 200, h: 40, text: pendingDropType }, raw: [] };
    activePage().records.push(rec);
    selectedIdx = activePage().records.indexOf(rec);
    pendingDropType = null;
    document.body.style.cursor = "";
    renderAll(); saveLocal();
  } else {
    selectedIdx = -1; renderAll();
  }
});

for (const b of document.querySelectorAll(".paletteitem")) {
  b.addEventListener("click", () => {
    pendingDropType = b.dataset.type;
    document.body.style.cursor = "crosshair";
  });
}

/* =========================================================================
 *  Keyboard.
 * ========================================================================= */
function deleteSelected() {
  if (selectedIdx < 0) return;
  pushUndo();
  activePage().records.splice(selectedIdx, 1);
  selectedIdx = -1;
  renderAll(); saveLocal();
}
function duplicateSelected() {
  if (selectedIdx < 0) return;
  pushUndo();
  const page = activePage();
  const orig = page.records[selectedIdx];
  const copy = JSON.parse(JSON.stringify(orig));
  copy.fields.x = (+copy.fields.x || 0) + 20;
  copy.fields.y = (+copy.fields.y || 0) + 20;
  if (copy.fields.id) copy.fields.id += "_copy";
  page.records.splice(selectedIdx + 1, 0, copy);
  selectedIdx += 1;
  renderAll(); saveLocal();
}
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if (e.key === "Delete" || e.key === "Backspace") { deleteSelected(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === "s") { saveFile(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === "d") { duplicateSelected(); e.preventDefault(); }
  else if (e.ctrlKey && e.key === "z") { doUndo(); e.preventDefault(); }
  else if (e.ctrlKey && (e.key === "y" || (e.shiftKey && e.key === "Z"))) { doRedo(); e.preventDefault(); }
  else if (e.key === "Escape") { selectedIdx = -1; renderAll(); }
  else if (selectedIdx >= 0 && e.key.startsWith("Arrow")) {
    const rec = activePage().records[selectedIdx];
    const step = e.shiftKey ? 10 : 1;
    const f = rec.fields;
    if (e.key === "ArrowLeft") f.x = (+f.x || 0) - step;
    if (e.key === "ArrowRight") f.x = (+f.x || 0) + step;
    if (e.key === "ArrowUp") f.y = (+f.y || 0) - step;
    if (e.key === "ArrowDown") f.y = (+f.y || 0) + step;
    renderCanvas(); saveLocal(); e.preventDefault();
  }
});

/* =========================================================================
 *  File ops.
 * ========================================================================= */
async function openFile() {
  if (window.showOpenFilePicker) {
    try {
      const [h] = await window.showOpenFilePicker({
        types: [{ description: "TSV", accept: { "text/tab-separated-values": [".tsv"] } }],
      });
      fileHandle = h;
      const file = await h.getFile();
      loadText(await file.text(), file.name);
      return;
    } catch (e) { if (e.name === "AbortError") return; }
  }
  $("#fileInput").click();
}
$("#fileInput").addEventListener("change", async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  loadText(await f.text(), f.name);
});
function loadText(text, name) {
  try {
    doc = parseTSV(text);
    doc.fileName = name;
    activePageIdx = 0; selectedIdx = -1;
    undoStack = []; redoStack = [];
    renderAll(); saveLocal();
    $("#status").textContent = "Loaded " + name;
  } catch (e) {
    alert("Parse error: " + e.message);
  }
}
async function saveFile() {
  const text = serializeTSV(doc);
  if (fileHandle) {
    try {
      const w = await fileHandle.createWritable();
      await w.write(text); await w.close();
      $("#status").textContent = "Saved " + fileHandle.name;
      return;
    } catch (e) { /* fall through */ }
  }
  saveAsFile(text);
}
async function saveAsFile(text) {
  text = text || serializeTSV(doc);
  if (window.showSaveFilePicker) {
    try {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: doc.fileName || "embedded_ui.tsv",
        types: [{ description: "TSV", accept: { "text/tab-separated-values": [".tsv"] } }],
      });
      const w = await fileHandle.createWritable();
      await w.write(text); await w.close();
      $("#status").textContent = "Saved " + fileHandle.name;
      return;
    } catch (e) { if (e.name === "AbortError") return; }
  }
  const blob = new Blob([text], { type: "text/tab-separated-values" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = doc.fileName || "embedded_ui.tsv";
  a.click();
  URL.revokeObjectURL(a.href);
}

$("#btnNew").addEventListener("click", () => {
  if (!confirm("Discard current document?")) return;
  fileHandle = null;
  newDoc(); renderAll(); saveLocal();
});
$("#btnOpen").addEventListener("click", openFile);
$("#btnSave").addEventListener("click", () => saveFile());
$("#btnSaveAs").addEventListener("click", () => saveAsFile());
$("#btnAddPage").addEventListener("click", () => {
  const id = prompt("New page id:");
  if (!id) return;
  pushUndo();
  doc.pages.push({ id, title: id, records: [], raw: [""] });
  activePageIdx = doc.pages.length - 1;
  selectedIdx = -1;
  renderAll(); saveLocal();
});
$("#btnAddInclude").addEventListener("click", () => {
  const opts = doc.pages.map(p => p.id).filter(id => id !== activePage().id);
  if (!opts.length) { alert("No other pages to include."); return; }
  const pg = prompt("Include page id (" + opts.join(", ") + "):", opts[0]);
  if (!pg) return;
  pushUndo();
  activePage().records.push({ kind: "include", fields: { page: pg }, raw: [] });
  renderAll(); saveLocal();
});
$("#btnAddAction").addEventListener("click", () => {
  pushUndo();
  activePage().records.push({ kind: "action", fields: { widget: "", event: "click", target: "" }, raw: [] });
  renderAll(); saveLocal();
});
$("#zoom").addEventListener("input", (e) => {
  zoom = +e.target.value / 100;
  $("#zoomlabel").textContent = e.target.value + "%";
  renderCanvas();
});
$("#gridToggle").addEventListener("change", (e) => {
  canvas.classList.toggle("showgrid", e.target.checked);
});

/* =========================================================================
 *  Boot.
 * ========================================================================= */
if (!loadLocal()) newDoc();
renderAll();
</script>
</body>
</html>
